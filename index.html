<!DOCTYPE html>
<html lang="en">
<head>
  <title>Responsive Vertical Half GIF</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

  <style>
    /* GIF as a responsive background for a section */
    .home-section 
    {
        position: relative;
        width: 100%;
        min-height: auto;     /* remove the large min-height */
        padding: 40px 0;     /* control top and bottom space */
        background: url("assets/bg.gif") no-repeat center center;
        background-size: cover;
        display: flex;
        align-items: center; /* vertically center content */
    }
    .home-container 
    {
        background-color: rgba(255, 255, 255, 0.95);
        border-radius: 10px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        padding: 20px;       /* adjust padding inside container */
        width: 90%;
        max-width: 1200px;
        margin: 0 auto;
    }

    h1 {
      font-size: 3rem;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-sm bg-white justify-content-center">
  <ul class="navbar-nav">
    <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
    <li class="nav-item"><a class="nav-link" href="#">About Me</a></li>
    <li class="nav-item"><a class="nav-link" href="#">Projects</a></li>
  </ul>
</nav>

<!-- Hero Section with GIF background -->
 <div class="home-section">
  <div class="home-container row align-items-center">
    <div class="col-md-6">
      <h1>Sanny's Portfolio</h1>
      <p>Welcome to my Portfolio! I am Grace and through this portfolio you'll get to know more about me.</p>
    </div>
    <div class="col-md-6 text-center">
      <img src="assets/sunflower.gif" class="img-fluid w-50">
    </div>
  </div>
 </div>

 <div class="about-me py-5">
  <div class="container text-center"> 
    <h1>About Me</h1>
  </div>
</div>

</body>
</html>
